name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

# The deploy action needs these.
permissions:
  contents: read
  pages: write
  id-token: write

# Only one Pages deployment at a time; skip queued ones if a newer push lands.
concurrency:
  group: pages
  cancel-in-progress: false

env:
  # Silence the "Node.js 20 actions deprecated" warning by running the
  # bundled JS actions on the runner's Node 24 ahead of GitHub's June 2026
  # default switch.
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
      - run: npm ci
      - name: Type-check
        run: npx tsc --noEmit -p .
      - name: Test
        run: npx vitest run
      - name: Build
        run: npm run build
      - uses: actions/configure-pages@v4
        with:
          # Auto-enable Pages on the repo if it isn't already configured to
          # build via GitHub Actions. Avoids the "Get Pages site failed:
          # HttpError: Not Found" failure that occurs when the action can't
          # find an existing Pages site on the first run.
          enablement: true
      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
